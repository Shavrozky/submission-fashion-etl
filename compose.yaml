services:
  postgres:
    image: postgres:17
    container_name: fashion-etl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgresexi
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fashion_etl
    ports:
      - "55432:5432"
    volumes:
      - fashion_etl_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d fashion_etl"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fashion_etl_postgres_data: